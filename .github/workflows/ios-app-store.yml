name: iOS App Store

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: App version, for example 1.0.5
        required: false
        default: ''
      build_number:
        description: Build number, must be higher than the latest App Store Connect build
        required: false
        default: ''
  push:
    tags:
      - 'ios-v*'

jobs:
  archive:
    name: Build signed IPA
    runs-on: macos-latest

    env:
      APP_SCHEME: App
      APP_PROJECT: ios/App/App.xcodeproj
      APP_BUNDLE_ID: pt.movvi.app
      ARCHIVE_PATH: build/App.xcarchive
      EXPORT_PATH: build/export
      KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Node dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install Apple signing assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${BUILD_CERTIFICATE_BASE64}" ] || [ -z "${P12_PASSWORD}" ] || [ -z "${BUILD_PROVISION_PROFILE_BASE64}" ] || [ -z "${KEYCHAIN_PASSWORD}" ]; then
            echo "Missing one or more iOS signing secrets."
            exit 1
          fi

          CERTIFICATE_PATH="${RUNNER_TEMP}/distribution.p12"
          PP_PATH="${RUNNER_TEMP}/profile.mobileprovision"
          PP_PLIST_PATH="${RUNNER_TEMP}/profile.plist"
          PP_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"

          echo "${BUILD_CERTIFICATE_BASE64}" | base64 -D > "${CERTIFICATE_PATH}"
          echo "${BUILD_PROVISION_PROFILE_BASE64}" | base64 -D > "${PP_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}"

          mkdir -p "${PP_DIR}"
          security cms -D -i "${PP_PATH}" > "${PP_PLIST_PATH}"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "${PP_PLIST_PATH}")
          cp "${PP_PATH}" "${PP_DIR}/${PROFILE_UUID}.mobileprovision"

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "${PP_PLIST_PATH}")
          echo "IOS_PROFILE_NAME=${PROFILE_NAME}" >> "${GITHUB_ENV}"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_MARKETING_VERSION: ${{ inputs.marketing_version }}
          IOS_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail

          VERSION_ARGS=()
          if [ -n "${IOS_MARKETING_VERSION}" ]; then
            VERSION_ARGS+=(MARKETING_VERSION="${IOS_MARKETING_VERSION}")
          fi
          if [ -n "${IOS_BUILD_NUMBER}" ]; then
            VERSION_ARGS+=(CURRENT_PROJECT_VERSION="${IOS_BUILD_NUMBER}")
          fi

          xcodebuild archive \
            -project "${APP_PROJECT}" \
            -scheme "${APP_SCHEME}" \
            -configuration Release \
            -archivePath "${ARCHIVE_PATH}" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="${APP_BUNDLE_ID}" \
            PROVISIONING_PROFILE_SPECIFIER="${IOS_PROFILE_NAME}" \
            "${VERSION_ARGS[@]}"

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: movvi-ios-ipa
          path: build/export/*.ipa
          if-no-files-found: error

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_API_KEY_ID}" ] || [ -z "${APP_STORE_CONNECT_ISSUER_ID}" ] || [ -z "${APP_STORE_CONNECT_API_PRIVATE_KEY}" ]; then
            echo "Skipping App Store Connect upload because API key secrets are not configured."
            exit 0
          fi

          API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "${APP_STORE_CONNECT_API_PRIVATE_KEY}" > "${API_KEY_PATH}"
          xcrun altool --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey "${APP_STORE_CONNECT_API_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_ISSUER_ID}"
